name: "GHScan Security Scanner"
description: "Scan your repository for exposed secrets, vulnerable dependencies, and security misconfigurations on every push and PR."
author: "GHScan"

branding:
  icon: "shield"
  color: "blue"

inputs:
  fail-threshold:
    description: "Minimum security score to pass (0-100). The check fails if the score is below this."
    required: false
    default: "70"
  scan-secrets:
    description: "Enable secret pattern scanning"
    required: false
    default: "true"
  scan-dependencies:
    description: "Enable dependency vulnerability scanning"
    required: false
    default: "true"
  scan-sourcemaps:
    description: "Enable source map leak detection"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for PR comments and check annotations. Defaults to the built-in GITHUB_TOKEN."
    required: false
    default: "${{ github.token }}"
  comment-on-pr:
    description: "Post scan results as a PR comment"
    required: false
    default: "true"
  max-files:
    description: "Maximum number of files to scan for secrets (0 = unlimited)"
    required: false
    default: "0"

outputs:
  score:
    description: "The security score (0-100)"
  vulnerabilities:
    description: "Number of dependency vulnerabilities found"
  secrets:
    description: "Number of exposed secrets found"
  sourcemaps:
    description: "Number of source map leaks found"
  passed:
    description: "Whether the scan passed the threshold (true/false)"

runs:
  using: "node20"
  main: "dist/index.js"
